name: Generate PR diagnostics

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run focused build and diagnostics
        run: python3 build.py --module backend
        continue-on-error: true

      - name: Verify diagnostic files
        run: |
          set -euo pipefail
          test -n "$(find diagnostic -maxdepth 1 -name 'build-*.logd' -type f -size +0 -print -quit)"
          test -n "$(find diagnostic -maxdepth 1 -name 'build-*.json' -type f -size +0 -print -quit)"

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: pr-diagnostics
          path: |
            diagnostic/build-*.logd
            diagnostic/build-*.json
